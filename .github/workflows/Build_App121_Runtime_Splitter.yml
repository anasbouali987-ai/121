name: Build App 121 Runtime Splitter

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "App121_Runtime_Splitter_Source_v2.zip"
      - ".github/workflows/build-121-apk.yml"
      - ".github/workflows/main.yml"

permissions:
  contents: read

concurrency:
  group: app121-runtime-splitter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build App 121 APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    env:
      SOURCE_ZIP: ${{ github.workspace }}/App121_Runtime_Splitter_Source_v2.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate and extract source
        run: |
          set -Eeuo pipefail

          test -s "$SOURCE_ZIP" || {
            echo "ERROR: Missing App121_Runtime_Splitter_Source_v2.zip"
            exit 1
          }

          unzip -t "$SOURCE_ZIP"

          EXTRACT_ROOT="$RUNNER_TEMP/app121-source"
          rm -rf "$EXTRACT_ROOT"
          mkdir -p "$EXTRACT_ROOT"
          unzip -q -o "$SOURCE_ZIP" -d "$EXTRACT_ROOT"

          SETTINGS_FILE="$(find "$EXTRACT_ROOT" -type f -name settings.gradle.kts -print | sort | head -n 1)"
          test -f "$SETTINGS_FILE" || {
            echo "ERROR: settings.gradle.kts was not found"
            find "$EXTRACT_ROOT" -maxdepth 8 -type f -printf '%P\n' | sort
            exit 1
          }

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          test -f "$PROJECT_DIR/app/build.gradle.kts"
          test -f "$PROJECT_DIR/app/src/main/AndroidManifest.xml"
          test -f "$PROJECT_DIR/app/src/main/java/com/gtavtools/app121/MainActivity.java"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Source SHA-256: $(sha256sum "$SOURCE_ZIP" | awk '{print $1}')"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          set -Eeuo pipefail
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
          cache-read-only: false

      - name: Validate Gradle project
        run: |
          set -Eeuo pipefail
          cd "$PROJECT_DIR"
          gradle projects --no-daemon --stacktrace

      - name: Build debug APK
        run: |
          set -Eeuo pipefail
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Validate and collect APK
        id: apk
        run: |
          set -Eeuo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/debug" -type f -name '*.apk' -print | sort | head -n 1)"
          test -s "$APK_FILE" || {
            echo "ERROR: APK was not generated"
            exit 1
          }

          OUTPUT_DIR="$RUNNER_TEMP/app121-output"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          OUTPUT_APK="$OUTPUT_DIR/App-121-Runtime-Splitter.apk"
          cp "$APK_FILE" "$OUTPUT_APK"
          unzip -t "$OUTPUT_APK"

          APK_SHA="$(sha256sum "$OUTPUT_APK" | awk '{print $1}')"
          APK_SIZE="$(stat -c '%s' "$OUTPUT_APK")"
          printf '%s  %s\n' "$APK_SHA" "$(basename "$OUTPUT_APK")" > "$OUTPUT_APK.sha256"
          unzip -lv "$OUTPUT_APK" > "$OUTPUT_DIR/apk-contents.txt"

          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "sha256=$APK_SHA" >> "$GITHUB_OUTPUT"
          echo "size=$APK_SIZE" >> "$GITHUB_OUTPUT"
          ls -lh "$OUTPUT_DIR"

      - name: Upload App 121 APK
        uses: actions/upload-artifact@v4
        with:
          name: App-121-Runtime-Splitter-${{ github.run_number }}
          path: |
            ${{ env.OUTPUT_DIR }}/App-121-Runtime-Splitter.apk
            ${{ env.OUTPUT_DIR }}/App-121-Runtime-Splitter.apk.sha256
            ${{ env.OUTPUT_DIR }}/apk-contents.txt
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Build summary
        if: always()
        run: |
          {
            echo "## App 121 Runtime Splitter"
            echo
            echo "- Job status: ${{ job.status }}"
            echo "- APK SHA-256: ${{ steps.apk.outputs.sha256 || 'not-generated' }}"
            echo "- APK size: ${{ steps.apk.outputs.size || 'not-generated' }} bytes"
          } >> "$GITHUB_STEP_SUMMARY"
