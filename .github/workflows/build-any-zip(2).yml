name: Build every ZIP project

on:
  push:
    paths:
      - '*.zip'
      - '**/*.zip'
      - '*.ZIP'
      - '**/*.ZIP'
  pull_request:
    paths:
      - '*.zip'
      - '**/*.zip'
      - '*.ZIP'
      - '**/*.ZIP'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-zips:
    name: Discover and build ZIP files
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Extract every ZIP safely
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .zip-build
          mkdir -p .zip-build/extracted .zip-build/apks

          python3 <<'PY'
          from __future__ import annotations

          import os
          import re
          import sys
          import zipfile
          from pathlib import Path

          repository = Path('.').resolve()
          destination_root = (repository / '.zip-build' / 'extracted').resolve()

          zip_files = sorted(
              path for path in repository.rglob('*')
              if path.is_file()
              and path.suffix.lower() == '.zip'
              and '.git' not in path.parts
              and '.zip-build' not in path.parts
          )

          if not zip_files:
              print('No ZIP files were found. The workflow started correctly, but there is nothing to build.')
              sys.exit(1)

          print(f'Found {len(zip_files)} ZIP file(s).')

          for index, archive in enumerate(zip_files, start=1):
              relative = archive.relative_to(repository)
              safe_name = re.sub(r'[^A-Za-z0-9._-]+', '_', str(relative.with_suffix('')))
              target = (destination_root / f'{index:02d}_{safe_name}').resolve()
              target.mkdir(parents=True, exist_ok=True)

              print(f'Extracting {relative} -> {target.relative_to(repository)}')
              try:
                  with zipfile.ZipFile(archive) as opened:
                      for member in opened.infolist():
                          member_path = (target / member.filename).resolve()
                          if member_path != target and target not in member_path.parents:
                              raise RuntimeError(f'Unsafe path in ZIP: {member.filename}')
                          if member.is_dir():
                              member_path.mkdir(parents=True, exist_ok=True)
                              continue
                          member_path.parent.mkdir(parents=True, exist_ok=True)
                          with opened.open(member) as source, open(member_path, 'wb') as output:
                              output.write(source.read())
              except zipfile.BadZipFile as error:
                  raise RuntimeError(f'{relative} is not a valid ZIP archive') from error
          PY

      - name: Find and build Android projects
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t SETTINGS < <(
            find .zip-build/extracted -type f \( -name settings.gradle -o -name settings.gradle.kts \) -print | sort
          )

          if [ "${#SETTINGS[@]}" -eq 0 ]; then
            echo 'ZIP files were detected and extracted, but no Gradle project was found.'
            exit 1
          fi

          built=0
          for settings_file in "${SETTINGS[@]}"; do
            project_dir="$(dirname "$settings_file")"

            if [ ! -f "$project_dir/build.gradle" ] && [ ! -f "$project_dir/build.gradle.kts" ]; then
              echo "Skipping $project_dir: root build file not found."
              continue
            fi

            echo "Building project at $project_dir"
            (
              cd "$project_dir"
              gradle --no-daemon --stacktrace :app:assembleDebug
            )

            project_key="$(echo "$project_dir" | sed 's#[^A-Za-z0-9._-]#_#g')"
            while IFS= read -r -d '' apk; do
              cp "$apk" "$GITHUB_WORKSPACE/.zip-build/apks/${project_key}_$(basename "$apk")"
              built=$((built + 1))
            done < <(find "$project_dir" -type f -path '*/build/outputs/apk/debug/*.apk' -print0)
          done

          if [ "$built" -eq 0 ]; then
            echo 'Projects were found, but no debug APK was produced.'
            exit 1
          fi

          echo "Collected $built APK file(s)."

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: zip-debug-apks
          path: .zip-build/apks/*.apk
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14