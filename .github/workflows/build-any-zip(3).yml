name: Build APK from any ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.zip"
      - ".github/workflows/build-any-zip.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Locate ZIP and Android project
        id: project
        shell: bash
        run: |
          set -euo pipefail

          EXTRACT_DIR="$RUNNER_TEMP/android-zip-project"
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"

          ZIP_FILE=""

          # Prefer a ZIP changed by the current push.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [[ "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              while IFS= read -r candidate; do
                if [[ -f "$candidate" ]]; then
                  ZIP_FILE="$candidate"
                fi
              done < <(git diff --name-only "$BEFORE" "$AFTER" -- "*.zip" "**/*.zip")
            fi
          fi

          # Manual-run fallback: use the only ZIP, or the most recently committed ZIP.
          if [[ -z "$ZIP_FILE" ]]; then
            mapfile -d '' ZIP_FILES < <(
              find . -type f -iname "*.zip" \
                -not -path "./.git/*" \
                -not -path "./build/*" \
                -print0
            )

            if (( ${#ZIP_FILES[@]} == 0 )); then
              echo "::error::No ZIP file was found in the repository."
              exit 1
            fi

            if (( ${#ZIP_FILES[@]} == 1 )); then
              ZIP_FILE="${ZIP_FILES[0]}"
            else
              ZIP_FILE="$(
                for candidate in "${ZIP_FILES[@]}"; do
                  timestamp="$(git log -1 --format=%ct -- "$candidate" 2>/dev/null || true)"
                  printf '%s\t%s\n' "${timestamp:-0}" "$candidate"
                done | sort -nr | head -n 1 | cut -f 2-
              )"
              echo "::warning::Multiple ZIP files were found. Using: $ZIP_FILE"
            fi
          fi

          echo "Using ZIP: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d "$EXTRACT_DIR"

          mapfile -t SETTINGS_FILES < <(
            find "$EXTRACT_DIR" -type f \
              \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
              | awk -F/ '{ print NF "\t" $0 }' \
              | sort -n \
              | cut -f 2-
          )

          if (( ${#SETTINGS_FILES[@]} == 0 )); then
            echo "::error::The ZIP does not contain a Gradle Android project."
            exit 1
          fi

          PROJECT_DIR="$(dirname "${SETTINGS_FILES[0]}")"
          echo "Detected project: $PROJECT_DIR"

          {
            echo "zip_file<<EOF"
            echo "$ZIP_FILE"
            echo "EOF"
            echo "project_dir<<EOF"
            echo "$PROJECT_DIR"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.project.outputs.project_dir }}
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [[ -f "gradle/wrapper/gradle-wrapper.jar" && -f "./gradlew" ]]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon :app:assembleDebug --stacktrace
          else
            echo "No official Gradle wrapper JAR found; using installed Gradle 8.9."
            gradle --no-daemon :app:assembleDebug --stacktrace
          fi

      - name: Collect APK files
        id: apk
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.project.outputs.project_dir }}
        run: |
          set -euo pipefail

          OUTPUT_DIR="$RUNNER_TEMP/apk-output"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          mapfile -d '' APK_FILES < <(
            find "$PROJECT_DIR" -type f -name "*.apk" \
              -path "*/build/outputs/apk/*" \
              -not -name "*androidTest*" \
              -print0
          )

          if (( ${#APK_FILES[@]} == 0 )); then
            echo "::error::Build finished, but no APK was found."
            exit 1
          fi

          for apk in "${APK_FILES[@]}"; do
            cp "$apk" "$OUTPUT_DIR/"
          done

          echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: ${{ steps.apk.outputs.output_dir }}/*.apk
          if-no-files-found: error
          retention-days: 14
